name: Release

on:
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "Existing tag to publish (e.g. v0.2.0). Builds that ref and creates/updates the GitHub Release with both zips. Leave empty to only verify + pack on main."
        required: false
        type: string
        default: ""
  push:
    branches:
      - main
    tags:
      - "v*"

# One in-flight run per ref (main vs each tag); never cancel — avoids half-published releases.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Creates v{manifest.version} on this commit when missing. Outputs whether the tag already existed.
  ensure-version-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag_created: ${{ steps.sync.outputs.tag_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync git tag from manifest version
        id: sync
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const manifest = JSON.parse(
              fs.readFileSync("extension/manifest.json", "utf8"),
            );
            const version = manifest.version;
            const tag = `v${version}`;
            const shortRef = `tags/${tag}`;
            let tagCreated = "false";
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: shortRef,
              });
              core.info(`Tag ${tag} already exists — nothing to do`);
            } catch (err) {
              if (err.status !== 404) throw err;
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Created ${tag} at ${context.sha}`);
              tagCreated = "true";
            }
            core.setOutput("tag_created", tagCreated);

  # When the tag already pointed at this release line, main may never get a tag *push* event.
  # Skip this if we just created the tag — the tag-triggered run publishes the release (no duplicate race).
  sync-release-gate:
    needs: ensure-version-tag
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.ensure-version-tag.outputs.tag_created != 'true'
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
      ref_to_build: ${{ steps.gate.outputs.ref_to_build }}
      tag_name: ${{ steps.gate.outputs.tag_name }}
    steps:
      - name: Checkout main (read manifest)
        uses: actions/checkout@v5

      - name: Decide if a GitHub Release is missing
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const version = JSON.parse(
              fs.readFileSync("extension/manifest.json", "utf8"),
            ).version;
            const tag = `v${version}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let tagSha;
            try {
              const { data: ref } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              if (ref.object.type === "commit") {
                tagSha = ref.object.sha;
              } else {
                const { data: tagObj } = await github.rest.git.getTag({
                  owner,
                  repo,
                  tag_sha: ref.object.sha,
                });
                tagSha = tagObj.object.sha;
              }
            } catch (e) {
              if (e.status === 404) {
                core.info(`No git tag ${tag} yet — skipping release sync`);
                core.setOutput("publish", "false");
                return;
              }
              throw e;
            }

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release for ${tag} already exists`);
              core.setOutput("publish", "false");
            } catch (e) {
              if (e.status === 404) {
                core.setOutput("publish", "true");
                core.setOutput("tag_name", tag);
                core.setOutput("ref_to_build", tagSha);
                core.info(`Will publish GitHub Release for ${tag} at ${tagSha}`);
              } else throw e;
            }

  sync-release-bundles:
    needs: sync-release-gate
    if: needs.sync-release-gate.outputs.publish == 'true'
    uses: ./.github/workflows/release-bundles.yml
    with:
      checkout_ref: ${{ needs.sync-release-gate.outputs.ref_to_build }}
      create_github_release: true
      release_tag_name: ${{ needs.sync-release-gate.outputs.tag_name }}
      submit_to_amo: ${{ vars.AMO_SUBMIT == 'true' }}
      submit_to_cws: ${{ vars.CWS_SUBMIT == 'true' }}
      cws_publish_target: ${{ vars.CWS_PUBLISH_TARGET || 'default' }}
    secrets:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      MOZ_AMO_JWT_SECRET: ${{ secrets.MOZ_AMO_JWT_SECRET }}
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}

  tag-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/release-bundles.yml
    with:
      checkout_ref: ${{ github.ref }}
      create_github_release: true
      release_tag_name: ${{ github.ref_name }}
      submit_to_amo: ${{ vars.AMO_SUBMIT == 'true' }}
      submit_to_cws: ${{ vars.CWS_SUBMIT == 'true' }}
      cws_publish_target: ${{ vars.CWS_PUBLISH_TARGET || 'default' }}
    secrets:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      MOZ_AMO_JWT_SECRET: ${{ secrets.MOZ_AMO_JWT_SECRET }}
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}

  dispatch-release:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag != ''
    uses: ./.github/workflows/release-bundles.yml
    with:
      checkout_ref: ${{ github.event.inputs.publish_tag }}
      create_github_release: true
      release_tag_name: ${{ github.event.inputs.publish_tag }}
      submit_to_amo: ${{ vars.AMO_SUBMIT == 'true' }}
      submit_to_cws: ${{ vars.CWS_SUBMIT == 'true' }}
      cws_publish_target: ${{ vars.CWS_PUBLISH_TARGET || 'default' }}
    secrets:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      MOZ_AMO_JWT_SECRET: ${{ secrets.MOZ_AMO_JWT_SECRET }}
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}

  smoke-pack:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag == ''
    uses: ./.github/workflows/release-bundles.yml
    with:
      checkout_ref: ${{ github.sha }}
      create_github_release: false
      release_tag_name: ""
      submit_to_amo: false
      submit_to_cws: false
      cws_publish_target: "default"
    secrets:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      MOZ_AMO_JWT_SECRET: ${{ secrets.MOZ_AMO_JWT_SECRET }}
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
