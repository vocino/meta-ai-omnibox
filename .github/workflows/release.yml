name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # When main advances, create v{manifest.version} if that tag does not exist yet.
  # CI on main already ran verify; the tag push triggers verify+package below.
  ensure-version-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync git tag from manifest version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const manifest = JSON.parse(
              fs.readFileSync("extension/manifest.json", "utf8"),
            );
            const version = manifest.version;
            const tag = `v${version}`;
            const shortRef = `tags/${tag}`;
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: shortRef,
              });
              core.info(`Tag ${tag} already exists — nothing to do`);
            } catch (err) {
              if (err.status !== 404) throw err;
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Created ${tag} at ${context.sha}`);
            }

  verify:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Verify all checks
        run: npm run verify

  package:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zips
        id: pack
        run: |
          bash scripts/pack-extension.sh
          v=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-bundles-v${{ steps.pack.outputs.version }}
          path: |
            dist/meta-ai-omnibox-chromium-v${{ steps.pack.outputs.version }}.zip
            dist/meta-ai-omnibox-firefox-v${{ steps.pack.outputs.version }}.zip

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meta-ai-omnibox-chromium-v${{ steps.pack.outputs.version }}.zip
            dist/meta-ai-omnibox-firefox-v${{ steps.pack.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
