name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Verify all checks
        run: npm run verify

  package:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zips
        run: bash scripts/pack-extension.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-bundles
          path: |
            dist/meta-ai-omnibox-chromium.zip
            dist/meta-ai-omnibox-firefox.zip

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meta-ai-omnibox-chromium.zip
            dist/meta-ai-omnibox-firefox.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
