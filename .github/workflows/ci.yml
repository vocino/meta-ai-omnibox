name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Lint Typecheck Unit Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify aligned extension versions
        run: npm run verify:versions

      - name: Verify extension publish tree
        run: npm run verify:extension-files

      - name: Verify store manifest constraints
        run: npm run verify:store-constraints

      - name: Lint
        run: npm run lint:all

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  pack-smoke:
    name: Pack release zips (smoke)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build release zips
        run: npm run pack

      - name: Upload packaged zips
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips-smoke
          path: |
            dist/meta-ai-omnibox-chromium-v*.zip
            dist/meta-ai-omnibox-firefox-v*.zip
          if-no-files-found: error

  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, chromium-extension]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.browser }}-artifacts
          path: |
            playwright-report/
            test-results/
