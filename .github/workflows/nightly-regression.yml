name: Nightly Regression

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  nightly-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            install_browser: chromium
          - browser: firefox
            install_browser: firefox
          - browser: chromium-extension
            install_browser: chromium
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.install_browser }}

      - name: Run nightly E2E
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.browser }}-artifacts
          path: |
            playwright-report/
            test-results/
