# Callable only — verify, pack both browser zips, optionally create a GitHub Release.
name: Release bundles

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: true
        type: string
      create_github_release:
        required: false
        type: boolean
        default: false
      release_tag_name:
        required: false
        type: string
        default: ""
      # When true (set from repo variable AMO_SUBMIT), upload Firefox zip to addons.mozilla.org via web-ext.
      submit_to_amo:
        required: false
        type: boolean
        default: false
      # When true (set from repo variable CWS_SUBMIT), upload Chromium zip to Chrome Web Store.
      submit_to_cws:
        required: false
        type: boolean
        default: false
      # Optional publish target passed to Chrome Web Store API (default or trustedTesters).
      cws_publish_target:
        required: false
        type: string
        default: "default"
    # Must be declared here and passed from the parent workflow — inherit alone does not expose repo secrets in reusable workflows.
    secrets:
      AMO_API_KEY:
        required: false
      AMO_API_SECRET:
        required: false
      # Optional fallback if AMO_API_SECRET stays empty in Actions (paste same Mozilla JWT secret here).
      MOZ_AMO_JWT_SECRET:
        required: false
      CWS_EXTENSION_ID:
        required: false
      CWS_CLIENT_ID:
        required: false
      CWS_CLIENT_SECRET:
        required: false
      CWS_REFRESH_TOKEN:
        required: false

permissions:
  contents: write

jobs:
  bundle:
    name: Extension bundles
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Verify all checks
        run: npm run verify

      - name: Build release zips
        id: pack
        run: |
          bash scripts/pack-extension.sh
          v=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Assert release tag matches manifest
        if: inputs.create_github_release
        env:
          RELEASE_TAG: ${{ inputs.release_tag_name }}
        run: |
          test -n "$RELEASE_TAG"
          TAG_VER="${RELEASE_TAG#v}"
          MANIFEST_VER=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          test "$TAG_VER" = "$MANIFEST_VER"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-bundles-v${{ steps.pack.outputs.version }}
          path: |
            dist/meta-ai-omnibox-chromium-v${{ steps.pack.outputs.version }}.zip
            dist/meta-ai-omnibox-firefox-v${{ steps.pack.outputs.version }}.zip

      - name: Create GitHub Release
        if: inputs.create_github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag_name }}
          name: ${{ inputs.release_tag_name }}
          files: |
            dist/meta-ai-omnibox-chromium-v${{ steps.pack.outputs.version }}.zip
            dist/meta-ai-omnibox-firefox-v${{ steps.pack.outputs.version }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit Firefox add-on to AMO
        if: inputs.submit_to_amo
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          S_AMO_SECRET: ${{ secrets.AMO_API_SECRET }}
          S_MOZ_FALLBACK: ${{ secrets.MOZ_AMO_JWT_SECRET }}
        run: |
          set -euo pipefail
          export WEB_EXT_API_SECRET="${S_AMO_SECRET:-${S_MOZ_FALLBACK:-}}"
          missing=()
          [ -z "${WEB_EXT_API_KEY}" ] && missing+=(AMO_API_KEY)
          [ -z "${WEB_EXT_API_SECRET}" ] && missing+=("AMO_API_SECRET or MOZ_AMO_JWT_SECRET")
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}. Set AMO_API_KEY and either AMO_API_SECRET or MOZ_AMO_JWT_SECRET (same JWT secret from AMO) under Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi
          # Inline AMO submit (do not rely on scripts/submit-amo.sh — tag checkouts may predate that file).
          VER="${{ steps.pack.outputs.version }}"
          ZIP="dist/meta-ai-omnibox-firefox-v${VER}.zip"
          ROOT="${GITHUB_WORKSPACE}"
          SRC="${ROOT}/dist/amo-submit"
          rm -rf "${SRC}"
          mkdir -p "${SRC}"
          unzip -q -d "${SRC}" "${ZIP}"
          wargs=(sign --source-dir "${SRC}" --channel listed --approval-timeout 0)
          # Listed uploads require license metadata; old tags may not include docs/ — pull from default branch.
          meta="${ROOT}/docs/amo-metadata.json"
          if [ ! -f "${meta}" ]; then
            mkdir -p "${ROOT}/docs"
            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/main/docs/amo-metadata.json" -o "${meta}"
          fi
          if [ -f "${meta}" ]; then
            wargs+=(--amo-metadata "${meta}")
          else
            echo "::error::No docs/amo-metadata.json in tree and could not fetch from main. Add the file on main or set AMO_USE_LISTING_METADATA workflows off until it exists."
            exit 1
          fi
          cd "${ROOT}"
          npx web-ext@8 "${wargs[@]}"

      - name: Submit Chromium extension to Chrome Web Store
        if: inputs.submit_to_cws
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_PUBLISH_TARGET: ${{ inputs.cws_publish_target }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${CWS_EXTENSION_ID}" ] && missing+=(CWS_EXTENSION_ID)
          [ -z "${CWS_CLIENT_ID}" ] && missing+=(CWS_CLIENT_ID)
          [ -z "${CWS_CLIENT_SECRET}" ] && missing+=(CWS_CLIENT_SECRET)
          [ -z "${CWS_REFRESH_TOKEN}" ] && missing+=(CWS_REFRESH_TOKEN)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}. Set CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, and CWS_REFRESH_TOKEN under Settings -> Secrets and variables -> Actions -> Repository secrets."
            exit 1
          fi

          VER="${{ steps.pack.outputs.version }}"
          ZIP="dist/meta-ai-omnibox-chromium-v${VER}.zip"
          [ -f "${ZIP}" ] || { echo "::error::Missing Chromium zip: ${ZIP}"; exit 1; }

          token_response=$(curl -fsS -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "client_id=${CWS_CLIENT_ID}" \
            --data-urlencode "client_secret=${CWS_CLIENT_SECRET}" \
            --data-urlencode "refresh_token=${CWS_REFRESH_TOKEN}" \
            --data-urlencode "grant_type=refresh_token")
          ACCESS_TOKEN=$(python3 -c "import json,sys; print(json.loads(sys.argv[1])['access_token'])" "${token_response}")
          if [ -z "${ACCESS_TOKEN}" ]; then
            echo "::error::Failed to obtain Google OAuth access token."
            exit 1
          fi

          upload_response=$(curl -fsS -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Type: application/zip" \
            --data-binary @"${ZIP}")
          upload_state=$(python3 -c "import json,sys; print(json.loads(sys.argv[1]).get('uploadState',''))" "${upload_response}")
          if [ "${upload_state}" != "SUCCESS" ]; then
            echo "::error::Chrome Web Store upload failed: ${upload_response}"
            exit 1
          fi

          publish_target="${CWS_PUBLISH_TARGET:-default}"
          publish_response=$(curl -fsS -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}/publish?publishTarget=${publish_target}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2")
          status_values=$(python3 -c "import json,sys; data=json.loads(sys.argv[1]); print(','.join(data.get('status', [])))" "${publish_response}")
          if [[ "${status_values}" != *OK* ]]; then
            echo "::error::Chrome Web Store publish may have failed: ${publish_response}"
            exit 1
          fi
          echo "Chrome Web Store publish status: ${status_values}"
